name: ChronosLOB CI

on:
  push:
    branches: ["main"]
    paths:
      - "chronos-lob/**"
      - ".github/workflows/chronoslob-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "chronos-lob/**"
      - ".github/workflows/chronoslob-ci.yml"

jobs:
  checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: chronos-lob

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: chronos-lob/pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Typecheck
        run: python -m mypy chronoslob

      - name: Test
        run: python -m pytest

      - name: Smoke
        run: |
          python -c "import chronoslob; print(chronoslob.__version__)"
          python -m chronoslob.cli version
          python -m chronoslob.cli doctor
